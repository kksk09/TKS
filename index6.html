<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target vs Actual Dashboard - Spacing Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg1: #0f172a; --bg2: #1e293b; --bg3: #111827;
            --glass: rgba(255,255,255,0.07);
            --glass-border: rgba(255,255,255,0.10);
            --text-main: #ffffff;
            --text-soft: rgba(255,255,255,0.72);
            --text-muted: rgba(255,255,255,0.45);
            --status-healthy: #4ADE80;
            --status-warning: #FBBF24;
            --status-critical: #FB7185;
            --gauge-empty: rgba(255,255,255,0.05);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
            min-height: 100vh; 
            padding: 30px 20px; /* เพิ่ม padding รอบตัว dashboard */
            color: var(--text-main); 
            transition: background 0.5s ease;
        }
        .dashboard { 
            display: grid; 
            grid-template-columns: 1fr 1.5fr; 
            gap: 20px; /* ระยะห่างระหว่าง card ซ้าย-ขวา */
            max-width: 1400px; 
            margin: auto; 
        }
        @media (max-width: 1024px) { .dashboard { grid-template-columns: 1fr; } }

        /* --- แก้ไขส่วนนี้: เพิ่มระยะห่างระหว่าง Stats ด้านบนกับ Dashboard ด้านล่าง --- */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; /* เพิ่มระยะห่างเป็น 30px เพื่อให้ไม่ติดกันเกินไป */
            max-width: 1400px; 
            margin-left: auto; 
            margin-right: auto; 
        }
        
        .glass { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            box-shadow: 0 14px 38px rgba(0,0,0,0.3); 
            transition: all 0.3s ease; 
        }
        .stat-card { 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            border-radius: 16px; 
            padding: 24px; /* เพิ่ม padding ในการ์ด */
        }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 1.8rem; font-weight: 800; display: block; margin-top: 8px; color: var(--text-main); }
        
        .card-left { padding: 30px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .theme-switcher { display: flex; gap: 8px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 999px; border: 1px solid var(--glass-border); }
        .theme-btn { border: none; padding: 7px 16px; border-radius: 999px; cursor: pointer; background: transparent; color: var(--text-soft); font-size: 0.75rem; font-weight: 600; transition: 0.3s; }
        .theme-btn.active { background: #818CF8; color: white; box-shadow: 0 4px 12px rgba(129, 140, 248, 0.3); }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.7rem; color: var(--text-muted); padding: 15px 12px; border-bottom: 1px solid var(--glass-border); text-transform: uppercase; }
        td { padding: 15px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-soft); }
        .value { font-weight: 700; color: var(--text-main); text-align: right; }
        
        .footer-date { margin-top: 25px; padding: 16px; background: rgba(0,0,0,0.1); border-radius: 20px; display: flex; flex-direction: column; gap: 10px; }
        .gauge-statusx { font-size: 0.7rem; font-weight: 700; padding: 10px 14px; border-radius: 999px; display: flex; align-items: center; gap: 8px; }
        .gauge-statusx::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        
        .card-graph { padding: 30px; text-align: center; margin-bottom: 20px; }
        .card-graph h3 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 20px; text-align: left; }
        .chart-container { height: 280px; position: relative; }
        .gauge-wrap #percentText { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); font-size: 2.6rem; font-weight: 900; }
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; margin-top: 15px; }
    </style>
</head>
<body>

<div class="stats-grid">
    <div class="stat-card"><span class="stat-label">Target <span class="target-year">-</span></span><span class="stat-value" id="stat-target">0</span></div>
    <div class="stat-card"><span class="stat-label">Actual Sales <span class="target-year">-</span></span><span class="stat-value" id="stat-actual" style="color: var(--status-healthy);">0</span></div>
    <div class="stat-card"><span class="stat-label">Achievement Rate</span><span class="stat-value" id="stat-rate">0%</span></div>
</div>

<div class="dashboard">
    <div class="card-left glass">
        <div class="toolbar">
            <h2>📊 Overview</h2>
            <div class="theme-switcher">
                <button class="theme-btn" data-theme="executive">Executive</button>
                <button class="theme-btn" data-theme="neon">Neon</button>
                <button class="theme-btn" data-theme="apple">Apple</button>
            </div>
        </div>
        <table>
            <thead><tr><th>Year</th><th style="text-align:right">Target (THB)</th><th style="text-align:right">Actual (Used)</th></tr></thead>
            <tbody id="data-table-body"><tr><td colspan="3" style="text-align:center">Loading...</td></tr></tbody>
        </table>
        <div class="footer-date">
            <div class="gauge-statusx" id="status_c">Critical (< 30%)</div>
            <div class="gauge-statusx" id="status_w">Warning (30-80%)</div>
            <div class="gauge-statusx" id="status_h">Healthy (> 80%)</div>
        </div>
    </div>
    <div class="right-column">
        <div class="card-graph glass">
            <h3>Yearly Progress</h3>
            <div class="chart-container gauge-wrap">
                <canvas id="gaugeChart"></canvas>
                <span id="percentText">0%</span>
            </div>
            <div id="gaugeStatus" class="status-badge">...</div>
        </div>
        <div class="card-graph glass">
            <h3>Comparison by Year</h3>
            <div class="chart-container"><canvas id="barChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = '1LuwjdyfKvP7VMVR0Ib9Qb9XbzhONNdslINIzFHixbbQ';
    const GID = '0';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
    const DEFAULT_THEME = 'executive';

    const THEMES = {
        executive: { css: {'--bg1': '#0f172a', '--bg2': '#1e293b', '--bg3': '#111827', '--glass': 'rgba(255,255,255,0.07)', '--glass-border': 'rgba(255,255,255,0.10)', '--text-main': '#ffffff', '--text-soft': 'rgba(255,255,255,0.72)', '--text-muted': 'rgba(255,255,255,0.45)', '--status-healthy': '#22C55E', '--status-warning': '#F59E0B', '--status-critical': '#EF4444', '--gauge-empty': 'rgba(255,255,255,0.05)'}},
        neon: { css: {'--bg1': '#050816', '--bg2': '#1a103f', '--bg3': '#09090f', '--glass': 'rgba(255,255,255,0.05)', '--glass-border': 'rgba(168,85,247,0.18)', '--text-main': '#F8FAFC', '--text-soft': 'rgba(248,250,252,0.78)', '--text-muted': 'rgba(248,250,252,0.48)', '--status-healthy': '#22D3EE', '--status-warning': '#FACC15', '--status-critical': '#FB7185', '--gauge-empty': 'rgba(255,255,255,0.05)'}},
        apple: { css: {'--bg1': '#f3f4f6', '--bg2': '#e5e7eb', '--bg3': '#f8fafc', '--glass': '#ffffff', '--glass-border': 'rgba(0,0,0,0.06)', '--text-main': '#1d1d1f', '--text-soft': '#424245', '--text-muted': '#86868b', '--status-healthy': '#28cd41', '--status-warning': '#ffcc00', '--status-critical': '#ff3b30', '--gauge-empty': '#e2e8f0'}}
    };

    let gaugeChart = null, barChart = null, globalData = null;
    let currentThemeKey = localStorage.getItem('dashboard-theme') || DEFAULT_THEME;

    const cleanNum = (val) => {
        if (typeof val === 'number') return val;
        if (!val) return 0;
        return parseFloat(val.toString().replace(/,/g, '').trim()) || 0;
    };

    async function init() {
        try {
            const resp = await fetch(CSV_URL + '&t=' + Date.now());
            const csv = await resp.text();
            Papa.parse(csv, {
                header: true, skipEmptyLines: true,
                complete: (results) => {
                    globalData = results.data.filter(d => d.year).map(d => ({
                        year: d.year, total: cleanNum(d.total), used: cleanNum(d.used)
                    })).sort((a, b) => a.year - b.year);
                    processData(globalData);
                }
            });
        } catch (e) { console.error("Error:", e); }
    }

    function processData(data) {
        if (!data || data.length === 0) return;
        const latest = data[data.length - 1];
        const rate = latest.total > 0 ? (latest.used / latest.total) * 100 : 0;

        document.querySelectorAll('.target-year').forEach(el => el.innerText = latest.year);
        document.getElementById('stat-target').innerText = latest.total.toLocaleString();
        document.getElementById('stat-actual').innerText = latest.used.toLocaleString();
        const rateEl = document.getElementById('stat-rate');
        rateEl.innerText = rate.toFixed(2) + '%';
        
        const statusColor = rate < 30 ? 'var(--status-critical)' : (rate < 80 ? 'var(--status-warning)' : 'var(--status-healthy)');
        rateEl.style.color = statusColor;

        document.getElementById('data-table-body').innerHTML = data.slice().reverse().map(row => `
            <tr><td>${row.year}</td><td class="value">${row.total.toLocaleString()}</td><td class="value" style="color: var(--status-healthy)">${row.used.toLocaleString()}</td></tr>
        `).join('');

        updateStatusLegend();
        renderCharts(rate, latest.used, latest.total, data);
    }

    function renderCharts(rate, used, total, data) {
        const canvas = document.getElementById('gaugeChart');
        const gCtx = canvas.getContext('2d');
        const rootStyles = getComputedStyle(document.documentElement);
        const emptyColor = rootStyles.getPropertyValue('--gauge-empty').trim();

        if (gaugeChart) gaugeChart.destroy();

        let gradient = gCtx.createLinearGradient(0, 0, canvas.width, 0);
        let displayColor = '';
        if (rate < 30) {
            gradient.addColorStop(0, '#DC2626'); gradient.addColorStop(1, '#FB7185');
            displayColor = rootStyles.getPropertyValue('--status-critical');
        } else if (rate < 80) {
            gradient.addColorStop(0, '#EA580C'); gradient.addColorStop(1, '#FBBF24');
            displayColor = rootStyles.getPropertyValue('--status-warning');
        } else {
            gradient.addColorStop(0, '#16A34A'); gradient.addColorStop(1, '#4ADE80');
            displayColor = rootStyles.getPropertyValue('--status-healthy');
        }

        document.getElementById('percentText').innerText = rate.toFixed(1) + '%';
        document.getElementById('percentText').style.color = displayColor;
        const badge = document.getElementById('gaugeStatus');
        badge.innerText = rate < 30 ? 'CRITICAL' : (rate < 80 ? 'WARNING' : 'HEALTHY');
        badge.style.background = displayColor + '22'; badge.style.color = displayColor;

        gaugeChart = new Chart(gCtx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [used, Math.max(0, total - used)],
                    backgroundColor: [gradient, emptyColor],
                    borderWidth: 0, circumference: 180, rotation: 270, borderRadius: 12
                }]
            },
            options: { cutout: '82%', maintainAspectRatio: false, plugins: { tooltip: { enabled: false } } }
        });

        const bCtx = document.getElementById('barChart').getContext('2d');
        if (barChart) barChart.destroy();
        barChart = new Chart(bCtx, {
            type: 'bar',
            data: {
                labels: data.map(d => d.year),
                datasets: [
                    { label: 'Target', data: data.map(d => d.total), backgroundColor: 'transparent', borderColor: '#818CF8', borderWidth: 2, borderRadius: 5 },
                    { label: 'Actual', data: data.map(d => d.used), backgroundColor: rootStyles.getPropertyValue('--status-healthy'), borderRadius: 5 }
                ]
            },
            options: {
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        type: 'logarithmic', 
                        grid: { color: currentThemeKey === 'apple' ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)' }, 
                        ticks: { color: 'var(--text-muted)', callback: v => v >= 1000000 ? (v/1000000)+'M' : v.toLocaleString() } 
                    },
                    x: { ticks: { color: 'var(--text-soft)' }, grid: { display: false } }
                },
                plugins: { legend: { labels: { color: 'var(--text-soft)', usePointStyle: true } } }
            }
        });
    }

    function updateStatusLegend() {
        ['status_c', 'status_w', 'status_h'].forEach((id, i) => {
            const colorVar = ['--status-critical', '--status-warning', '--status-healthy'][i];
            const color = getComputedStyle(document.documentElement).getPropertyValue(colorVar);
            const el = document.getElementById(id);
            if(el) {
                el.style.color = color; el.style.background = color + '15'; el.style.borderColor = color + '30';
            }
        });
    }

    function applyTheme(themeKey) {
        currentThemeKey = themeKey;
        const theme = THEMES[themeKey] || THEMES[DEFAULT_THEME];
        Object.entries(theme.css).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
        localStorage.setItem('dashboard-theme', themeKey);
        document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.theme === themeKey));
        if (globalData) processData(globalData);
    }

    window.onload = () => {
        document.querySelectorAll('.theme-btn').forEach(btn => btn.addEventListener('click', () => applyTheme(btn.dataset.theme)));
        applyTheme(currentThemeKey);
        init();
    };
</script>
</body>
</html>
