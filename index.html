<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target vs Actual Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg1: #0f172a; --bg2: #1e1b4b; --bg3: #111827;
            --glass: rgba(255,255,255,0.07);
            --glass-border: rgba(255,255,255,0.10);
            --text-main: #ffffff;
            --text-soft: rgba(255,255,255,0.72);
            --text-muted: rgba(255,255,255,0.45);
            --status-healthy: #4ADE80;
            --status-warning: #FBBF24;
            --status-critical: #FB7185;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
            min-height: 100vh; padding: 24px 16px; color: var(--text-main);
        }
        .dashboard { display: grid; grid-template-columns: 1fr 1.5fr; gap: 18px; max-width: 1400px; margin: auto; }
        @media (max-width: 1024px) { .dashboard { grid-template-columns: 1fr; } }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; max-width: 1400px; margin-left: auto; margin-right: auto; }
        .stat-card { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 20px; }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-value { font-size: 1.6rem; font-weight: 800; display: block; margin-top: 5px; }
        .card-left { padding: 30px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-switcher { display: flex; gap: 8px; background: rgba(255,255,255,0.06); padding: 5px; border-radius: 999px; }
        .theme-btn { border: none; padding: 6px 15px; border-radius: 999px; cursor: pointer; background: transparent; color: var(--text-soft); font-size: 0.75rem; }
        .theme-btn.active { background: #818CF8; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.7rem; color: var(--text-muted); padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-soft); }
        .value { font-weight: 700; color: #fff; text-align: right; }
        .footer-date { margin-top: 18px; padding: 16px; background: rgba(255, 255, 255, 0.03); border-radius: 20px; display: flex; flex-direction: column; gap: 8px; }
        .gauge-statusx { font-size: 0.7rem; font-weight: 700; padding: 6px 12px; border-radius: 999px; display: flex; align-items: center; gap: 6px; }
        .gauge-statusx::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .card-graph { padding: 25px; text-align: center; margin-bottom: 18px; }
        .card-graph h3 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 15px; text-align: left; }
        .chart-container { height: 280px; position: relative; }
        .gauge-wrap #percentText { position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%); font-size: 2.2rem; font-weight: 900; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 0.7rem; font-weight: 700; margin-top: 10px; }
    </style>
</head>
<body>

<div class="stats-grid">
    <div class="stat-card"><span class="stat-label">Target <span class="target-year">-</span></span><span class="stat-value" id="stat-target">0</span></div>
    <div class="stat-card"><span class="stat-label">Sales <span class="target-year">-</span></span><span class="stat-value" id="stat-actual" style="color: #4ADE80;">0</span></div>
    <div class="stat-card"><span class="stat-label">Achievement Rate</span><span class="stat-value" id="stat-rate">0%</span></div>
</div>

<div class="dashboard">
    <div class="card-left glass">
        <div class="toolbar">
            <h2>📊 Overview</h2>
            <div class="theme-switcher">
                <button class="theme-btn active" data-theme="executive">Executive</button>
                <button class="theme-btn" data-theme="neon">Neon</button>
                <button class="theme-btn" data-theme="apple">Apple</button>
            </div>
        </div>
        <table>
            <thead><tr><th>Year</th><th style="text-align:right">Target</th><th style="text-align:right">Actual</th></tr></thead>
            <tbody id="data-table-body"></tbody>
        </table>
        <div class="footer-date">
            <div class="gauge-statusx" id="status_c">Critical (< 30%)</div>
            <div class="gauge-statusx" id="status_w">Warning (30-80%)</div>
            <div class="gauge-statusx" id="status_h">Healthy (> 80%)</div>
        </div>
    </div>
    <div class="right-column">
        <div class="card-graph glass">
            <h3>Yearly Progress</h3>
            <div class="chart-container gauge-wrap">
                <canvas id="gaugeChart"></canvas>
                <span id="percentText">0%</span>
            </div>
            <div id="gaugeStatus" class="status-badge">Loading...</div>
        </div>
        <div class="card-graph glass">
            <h3>Comparison by Year</h3>
            <div class="chart-container"><canvas id="barChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = '1LuwjdyfKvP7VMVR0Ib9Qb9XbzhONNdslINIzFHixbbQ';
    const GID = '0';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
    
    let gaugeChart = null;
    let barChart = null;
    let globalData = null;

    // ฟังก์ชันล้างตัวเลขที่มี Comma หรือตัวอักษร
    const parseNum = (v) => {
        if (!v) return 0;
        let n = parseFloat(v.toString().replace(/,/g, '').trim());
        return isNaN(n) ? 0 : n;
    };

    async function init() {
        try {
            const resp = await fetch(CSV_URL + '&t=' + Date.now());
            const csv = await resp.text();
            Papa.parse(csv, {
                header: true,
                skipEmptyLines: true,
                complete: (results) => {
                    globalData = results.data.filter(d => d.year).map(d => ({
                        year: d.year,
                        total: parseNum(d.total),
                        used: parseNum(d.used)
                    })).sort((a,b) => a.year - b.year);
                    updateUI();
                }
            });
        } catch (e) { console.error("Load error:", e); }
    }

    function updateUI() {
        if (!globalData || globalData.length === 0) return;
        const latest = globalData[globalData.length - 1];
        const rate = latest.total > 0 ? (latest.used / latest.total) * 100 : 0;

        // Stats
        document.querySelectorAll('.target-year').forEach(el => el.innerText = latest.year);
        document.getElementById('stat-target').innerText = latest.total.toLocaleString();
        document.getElementById('stat-actual').innerText = latest.used.toLocaleString();
        const rateEl = document.getElementById('stat-rate');
        rateEl.innerText = rate.toFixed(2) + '%';
        const color = rate < 30 ? '#FB7185' : (rate < 80 ? '#FBBF24' : '#4ADE80');
        rateEl.style.color = color;

        // Table
        document.getElementById('data-table-body').innerHTML = globalData.slice().reverse().map(d => `
            <tr><td>${d.year}</td><td class="value">${d.total.toLocaleString()}</td><td class="value" style="color:#4ADE80">${d.used.toLocaleString()}</td></tr>
        `).join('');

        renderGauge(rate, latest.used, latest.total, color);
        renderBar(globalData);
        updateStatusColors();
    }

    function renderGauge(rate, used, total, color) {
        const ctx = document.getElementById('gaugeChart').getContext('2d');
        if (gaugeChart) gaugeChart.destroy();
        document.getElementById('percentText').innerText = rate.toFixed(1) + '%';
        document.getElementById('percentText').style.color = color;
        const status = document.getElementById('gaugeStatus');
        status.innerText = rate < 30 ? 'CRITICAL' : (rate < 80 ? 'WARNING' : 'HEALTHY');
        status.style.background = color + '22'; status.style.color = color;

        gaugeChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [used, Math.max(0, total - used)],
                    backgroundColor: [color, 'rgba(255,255,255,0.05)'],
                    borderWidth: 0, circumference: 180, rotation: 270, borderRadius: 10
                }]
            },
            options: { cutout: '80%', maintainAspectRatio: false, plugins: { tooltip: { enabled: false } } }
        });
    }

    function renderBar(data) {
        const ctx = document.getElementById('barChart').getContext('2d');
        if (barChart) barChart.destroy();
        barChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.map(d => d.year),
                datasets: [
                    { label: 'Target', data: data.map(d => d.total), backgroundColor: 'transparent', borderColor: '#818CF8', borderWidth: 2, borderRadius: 4 },
                    { label: 'Actual', data: data.map(d => d.used), backgroundColor: '#10B981', borderRadius: 4 }
                ]
            },
            options: {
                maintainAspectRatio: false,
                scales: {
                    y: { type: 'logarithmic', grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
                },
                plugins: { legend: { labels: { color: '#94a3b8', usePointStyle: true } } }
            }
        });
    }

    function updateStatusColors() {
        const root = getComputedStyle(document.documentElement);
        ['status_c', 'status_w', 'status_h'].forEach((id, i) => {
            const colors = ['--status-critical', '--status-warning', '--status-healthy'];
            const c = root.getPropertyValue(colors[i]);
            const el = document.getElementById(id);
            el.style.color = c; el.style.background = c + '15'; el.style.borderColor = c + '30';
        });
    }


function processData(rawData) {
        // ฟังก์ชันช่วยแปลงค่าให้เป็นตัวเลขที่แท้จริง
        const cleanNum = (val) => {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            // ลบ Comma (,) และช่องว่างออก แล้วแปลงเป็น Float
            const sanitized = val.toString().replace(/,/g, '').trim();
            return parseFloat(sanitized) || 0;
        };

        // 1. Clean & Sort Data
        const data = rawData
            .filter(d => d.year) 
            .map(d => ({
                year: d.year,
                total: cleanNum(d.total), // คลีนค่า Target
                used: cleanNum(d.used)    // คลีนค่า Actual
            }))
            .sort((a, b) => a.year - b.year);

        if (data.length === 0) {
            console.error("No valid data found");
            return;
        }

        const latest = data[data.length - 1];
        
        // คำนวณ Achievement Rate
        const rate = latest.total > 0 ? (latest.used / latest.total) * 100 : 0;

        // อัปเดต Stats บนหน้าจอ
        document.querySelectorAll('.target-year').forEach(el => el.innerText = latest.year);
        document.getElementById('stat-target').innerText = latest.total.toLocaleString();
        document.getElementById('stat-actual').innerText = latest.used.toLocaleString();
        
        const rateEl = document.getElementById('stat-rate');
        rateEl.innerText = isNaN(rate) ? "0.00%" : rate.toFixed(2) + '%';
        
        // ปรับสี Rate
        const statusColor = rate < 30 ? 'var(--status-critical)' : (rate < 80 ? 'var(--status-warning)' : 'var(--status-healthy)');
        rateEl.style.color = statusColor;
        const rateGuage = document.getElementById('percentText');
        //percentText gaugeStatus
        rateGuage.innerText = isNaN(rate) ? "0.00%" : rate.toFixed(2) + '%';
        rateGuage.style.color = statusColor;

        // อัปเดตตาราง (แสดงจากปีล่าสุดขึ้นก่อน)
        const tbody = document.getElementById('data-table-body');
        tbody.innerHTML = data.slice().reverse().map(row => `
            <tr>
                <td>${row.year}</td>
                <td class="value">${row.total.toLocaleString()}</td>
                <td class="value" style="color: var(--status-healthy)">${row.used.toLocaleString()}</td>
            </tr>
        `).join('');

        // อัปเดต Legend และวาดกราฟ
        updateStatusLegend();
        renderCharts(rate, latest.used, latest.total, data);
    }
    

    document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            // Theme logic can be expanded here
        });
    });

    // window.onload = init;


    function applyTheme(themeKey) {
        currentThemeKey = themeKey;
        const theme = THEMES[themeKey] || THEMES[DEFAULT_THEME];
        const root = document.documentElement;
        Object.entries(theme.css).forEach(([key, value]) => root.style.setProperty(key, value));
        
        localStorage.setItem('dashboard-theme', themeKey);
        document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.theme === themeKey));
        
        if (globalData) processData(globalData); // Redraw with theme colors
    }


     window.onload = () => {
        init();
        applyTheme(currentThemeKey);
        document.querySelectorAll('.theme-btn').forEach(btn => btn.addEventListener('click', () => applyTheme(btn.dataset.theme)));
        // fetchData();
        
    };

</script>
</body>
</html>
