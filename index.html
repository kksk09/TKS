<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Target Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box;margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #1e1b4b 100%);
            min-height: 100vh;
            padding: 24px 16px;
        }

/* body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(
    135deg,
    #1e1b4b 0%,
    #312e81 40%,
    #1e1b4b 100%
  );

  min-height: 100vh;
  margin: 0;
  padding: 40px 30px;
} */
        /* Subtle animated orb overlay */
        body::before {
            content: '';
            position: fixed;
            top: -200px; left: -200px;
            width: 500px; height: 500px;

            background: radial-gradient(circle, rgba(129,140,248,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -200px; right: -200px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(244,114,182,0.10) 0%, transparent 70%);
            pointer-events: none;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 16px;
            max-width: 1200px;
            margin: auto;
            /* align-items: flex-start; */
            position: relative;
        }
         @media (max-width: 768px) {
            body { padding: 16px 12px; }
            .dashboard { grid-template-columns: 1fr; }
            .right-column { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        }

        @media (max-width: 500px) {
            body { padding: 12px 10px; }
            .right-column { grid-template-columns: 1fr !important; }
            .chart-container { height: 200px; }
        }
        /* Glass card base */
        .glass {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 20px;
        }

        .card-left {
            /* flex: 1; */
            padding: 28px;
            color: white;
        }

        .right-column {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card-graph {
            padding: 24px;
            text-align: center;
            color: white;
        }

        /* Header section */
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .card-header h2 {
            font-size: 1rem;
            font-weight: 600;
            color: white;
            margin-bottom: 14px;
        }

        .update-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 999px;
            padding: 6px 14px;
            margin-bottom: 16px;
        }

        .update-badge .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #818CF8;
            box-shadow: 0 0 0 3px rgba(129,140,248,0.25);
            flex-shrink: 0;
        }

        .update-badge span {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.7);
        }

        .update-badge strong {
            color: #a5b4fc;
            font-weight: 600;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            /* margin-top: 8px; */
        }

        thead th {
            font-size: 0.72rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.4);
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            text-align: left;
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(255,255,255,0.05);
        }

        tbody td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.75);
            font-size: 0.9rem;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .value {
            font-weight: 600;
            color: #ffffff !important;
            font-size: 1.05rem;
            font-variant-numeric: tabular-nums;
        }

        .footer-date {
            margin-top: 18px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
        }

        /* ── Right column ── */
        .right-column { display: flex; flex-direction: column; gap: 16px; }

        /* ── Chart cards ── */
        .card-graph {
            padding: 20px 16px;
            text-align: center;
            color: white;
            flex: 1;
        }        

        /* Chart card */
        .card-graph h3 {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 2px;
        }
        .chart-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: white;
            margin-bottom: 2px;
        }

        .chart-container {
            height: 230px;
            position: relative;
            margin-top: 10px;
        }

        /* Gauge percent overlay */
        .gauge-wrap {
            position: relative;
        }

        #percentText {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.6rem;
            font-weight: 700;
            color: #818CF8;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card-left glass">
        <div class="card-header">
            <h2>&#x1F4CA;  Overview</h2>
        </div>

        <div class="update-badge">
            <span class="dot"></span>
            <span>New update: <strong id="date-badge"></strong></strong></span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Amount (THB)</th>
                </tr>
            </thead>
            <tbody id="data-table-body">
                <tr><td colspan="2" style="text-align:center; color:rgba(255,255,255,0.4); padding:24px;">Loading data...</td></tr>
            </tbody>
        </table>

        <div class="footer-date">
            Last updated: <span id="current-date"></span>
        </div>
    </div>

    <div class="right-column">
        <div class="card-graph glass">
            <h3>Sales Target Progress — <span id="date-gauge"></span></h3>
            <div class="chart-container gauge-wrap">
                <canvas id="gaugeChart"></canvas>
                <span id="percentText">0%</span>
            </div>
        </div>

        <div class="card-graph glass">
            <h3>Up to NOW vs Total Balance — <span id="date-donut"></span></h3>
            <div class="chart-container">
                <canvas id="donutChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const formatNum = (num) => new Intl.NumberFormat('th-TH').format(num || 0);

    const SHEET_ID = '1LuwjdyfKvP7VMVR0Ib9Qb9XbzhONNdslINIzFHixbbQ';
    const GID = '0';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

    async function initDashboard() {
        try {
            const url = CSV_URL + '&t=' + new Date().getTime();
            const response = await fetch(url);
            if (!response.ok) throw new Error('Cannot fetch data from Google Sheets');
            const csvText = await response.text();

            Papa.parse(csvText, {
                header: true,
                dynamicTyping: true,
                skipEmptyLines: true,
                complete: function(results) {
                    if (results.data.length > 0) {
                        const csvData = results.data[0];
                        const data = {
                            total: parseFloat(csvData.total) || 0,
                            used: parseFloat(csvData.used) || 0,
                            balance: parseFloat(csvData.balance) || 0
                        };
                        updateUI(data);
                        renderCharts(data);
                    }
                }
            });
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('data-table-body').innerHTML =
                `<tr><td colspan="2" style="color:rgba(255,100,100,0.8); text-align:center; padding:20px;">Error: ${error.message}</td></tr>`;
        }
    }

    function updateUI(data) {
        const tableBody = document.getElementById('data-table-body');
        const rows = [
            ["Total of this year", data.total],
            ["Up to NOW", data.used],
            ["Total Balance", data.balance]
        ];

        tableBody.innerHTML = rows.map(row => `
            <tr>
                <td>${row[0]}</td>
                <td class="value">${formatNum(row[1])}</td>
            </tr>
        `).join('');

        const usedPercent = data.total > 0 ? ((data.used / data.total) * 100).toFixed(2) : 0;
        document.getElementById('percentText').innerText = usedPercent + '%';

        const today = new Date();
        const dateStr = today.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById('current-date').innerText = dateStr;
    }

    function renderCharts(data) {
        Chart.defaults.color = 'rgba(255,255,255,0.5)';

        const ctx1 = document.getElementById('gaugeChart').getContext('2d');
        new Chart(ctx1, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [data.used, Math.max(0, data.total - data.used)],
                    backgroundColor: ['#818CF8', 'rgba(255,255,255,0.08)'],
                    borderWidth: 0,
                    circumference: 180,
                    rotation: 270,
                }]
            },
            options: {
                maintainAspectRatio: false,
                cutout: '80%',
                plugins: { legend: { display: false }, tooltip: { enabled: false } }
            }
        });

        const ctx2 = document.getElementById('donutChart').getContext('2d');
        new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['Up to NOW', 'Total Balance'],
                datasets: [{
                    data: [data.used, data.balance],
                    backgroundColor: ['#F472B6', '#34D399'],
                    borderWidth: 2,
                    borderColor: 'rgba(0,0,0,0)',
                    hoverOffset: 6
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: 'rgba(255,255,255,0.6)', padding: 16, font: { size: 13 } }
                    }
                }
            }
        });
    }

    // Set month/year labels
    const today = new Date();
    const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const monthYear = monthNames[today.getMonth()] + ' ' + today.getFullYear();
    ['date-badge','date-gauge','date-donut'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = monthYear;
    });

    window.onload = initDashboard;
</script>

</body>
</html>
