<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Target Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; margin: 0; padding: 30px; }
        .dashboard { display: flex; gap: 20px; max-width: 1200px; margin: auto; align-items: flex-start; }
        .card-left { flex: 1; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .right-column { flex: 1.2; display: flex; flex-direction: column; gap: 20px; }
        .card-graph { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #666; font-size: 0.9rem; text-transform: uppercase; }
        .value { font-weight: 600; color: #333; font-size: 1.1rem; }
        .chart-container { height: 250px; position: relative; margin-top: 15px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card-left">
        <h2 class="text-xl font-bold mb-4 text-gray-800">📊 Target Summary</h2>
        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Amount (THB)</th>
                </tr>
            </thead>
            <tbody id="data-table-body">
                <tr><td colspan="2" class="text-center py-4">Loading data...</td></tr>
            </tbody>
        </table>
        <div class="mt-6 p-4 bg-blue-50 rounded-lg">
            <p class="text-sm text-blue-600 font-medium">Last Update: <span id="current-date"></span></p>
        </div>
    </div>

    <div class="right-column">
        <div class="card-graph">
            <h3 class="font-semibold text-gray-700">Usage Progress</h3>
            <div class="chart-container">
                <canvas id="gaugeChart"></canvas>
            </div>
        </div>

        <div class="card-graph">
            <h3 class="font-semibold text-gray-700">Budget Allocation</h3>
            <div class="chart-container">
                <canvas id="donutChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // ฟังก์ชันจัดรูปแบบตัวเลข
    const formatNum = (num) => new Intl.NumberFormat('th-TH').format(num);

    // ฟังก์ชันหลักในการดึงข้อมูล CSV
    async function initDashboard() {
        try {

            
        
        const response = await fetch('target.csv');
        if (!response.ok) {
            throw new Error(`หาไฟล์ target.csv ไม่เจอ (Status: ${response.status})`);
        }
            const csvText = await response.text();

            Papa.parse(csvText, {
                header:  false,
                dynamicTyping: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const csvData = results.data[0];
                    const data = {
                        total: csvData.total,
                        used: csvData.used,
                        balance: csvData.balance
                    };

                    updateUI(data);
                    renderCharts(data);
                }
            });
        } catch (error) {
            console.error("Error loading CSV:", error);
            document.getElementById('data-table-body').innerHTML = `<tr><td colspan="2" class="text-red-500 text-center">Error loading target.csv</td></tr>`;
        }
    }

    // อัปเดตข้อมูลในตารางและวันที่
    function updateUI(data) {
        const tableBody = document.getElementById('data-table-body');
        const rows = [
            ["Total of this year", data.total],
            ["Up to NOW", data.used],
            ["Total Balance", data.balance]
        ];

        tableBody.innerHTML = rows.map(row => `
            <tr>
                <td>${row[0]}</td>
                <td class="value">${formatNum(row[1])}</td>
            </tr>
        `).join('');

        const today = new Date();
        document.getElementById('current-date').innerText = today.toLocaleDateString('th-TH', { 
            day: 'numeric', month: 'long', year: 'numeric' 
        });
    }

    // ฟังก์ชันวาดกราฟ
    function renderCharts(data) {
        // 1. Gauge Chart (ครึ่งวงกลม)
        new Chart(document.getElementById('gaugeChart'), {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [data.used, data.total - data.used],
                    backgroundColor: ['#4285F4', '#E8EAED'],
                    borderWidth: 0,
                    circumference: 180,
                    rotation: 270,
                }]
            },
            options: {
                maintainAspectRatio: false,
                cutout: '80%',
                plugins: { tooltip: { enabled: true } }
            }
        });

        // 2. Donut Chart
        new Chart(document.getElementById('donutChart'), {
            type: 'doughnut',
            data: {
                labels: ['Used', 'Remaining'],
                datasets: [{
                    data: [data.used, data.balance],
                    backgroundColor: ['#EA4335', '#34A853'],
                    hoverOffset: 10
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12, padding: 20 } }
                }
            }
        });
    }

    // เรียกใช้งานเมื่อหน้าเว็บโหลดเสร็จ
    window.onload = initDashboard;
</script>

</body>
</html>
