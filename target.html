<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Target Dashboard </title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; margin: 0; padding: 30px; }
        .dashboard { display: flex; gap: 20px; max-width: 1200px; margin: auto; align-items: flex-start; }
        
        /* ฝั่งซ้าย: ตาราง */
        .card-left { flex: 1; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* ฝั่งขวา: กราฟ */
        .right-column { flex: 1.2; display: flex; flex-direction: column; gap: 20px; }
        .card-graph { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { color: #888; font-weight: 500; font-size: 0.9rem; }
        .val { text-align: right; font-weight: bold; }
        
        /* จัดการตำแหน่ง Gauge */
        .gauge-container { 
            position: relative; 
            width: 300px; 
            height: 180px; 
            margin: 0 auto; /* จัดกลาง */
        }
        .gauge-label {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        .percentage { font-size: 1.8rem; font-weight: bold; color: #4285F4; }
        .label-name { font-size: 0.9rem; color: #666; display: block; }

        h2 { font-size: 1.2rem; margin-top: 0; color: #333; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card-left">
        <h2>New update : <p style="display:inline;" id="date"></p> </h2>
        <table>
            <thead><tr><th>รายการ</th><th class="val">มูลค่า (บาท)</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="right-column">
        <div class="card-graph">
            <h2> </h2>
<p style="display:inline;" id="date"></p>
            <div class="gauge-container">
                <canvas id="gaugeChart"></canvas>
                <div class="gauge-label">
                    <span class="percentage" id="percentText">0%</span>
                    <!--span class="label-name">ของงบประมาณทั้งหมด</span-->
                </div>
            </div>
        </div>

        <div class="card-graph">
            <h2><p style="display:inline;" id="date"></p></h2>
            <div style="height: 250px;">
                <canvas id="donutChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const data = {
        total: 400000000,
        used: 2166196,
        balance: 397833804
    };

    // ใส่ข้อมูลตาราง
    const rows = [
        ["Total of this year", data.total],
        ["Up to NOW", data.used],
        ["Total Balance", data.balance]
    ];
    document.getElementById('tableBody').innerHTML = rows.map(r => 
        `<tr><td>${r[0]}</td><td class="val">${r[1].toLocaleString(undefined, {minimumFractionDigits:2})}</td></tr>`
    ).join('');

    const usedPercent = ((data.used / data.total) * 100).toFixed(2);
    document.getElementById('percentText').innerText = usedPercent + "%";

    // 1. Gauge Chart (ครึ่งวงกลมจัดกลาง)
    new Chart(document.getElementById('gaugeChart'), {
        type: 'doughnut',
        data: {
            datasets: [{
                data: [data.used, data.total - data.used],
                backgroundColor: ['#4285F4', '#E8EAED'],
                borderWidth: 0,
                circumference: 180,
                rotation: 270,
            }]
        },
        options: {
            maintainAspectRatio: false,
            cutout: '80%',
            plugins: { tooltip: { enabled: false } }
        }
    });

    // 2. Donut Chart พร้อม Legend
    new Chart(document.getElementById('donutChart'), {
        type: 'doughnut',
        data: {
            labels: ['Up to NOW', 'Remaining Balance'],
            datasets: [{
                data: [data.used, data.balance],
                backgroundColor: ['#EA4335', '#34A853'],
                hoverOffset: 10
            }]
        },
        options: {
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { boxWidth: 12, padding: 20 } }
            }
        }
    });
</script>

<script>
const today = new Date();

const monthNames = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

const month = monthNames[today.getMonth()];
const year = today.getFullYear();

document.getElementById("date").innerHTML = month + " " + year;
</script>


</body>
</html>
