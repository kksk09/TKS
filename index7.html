<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target vs Actual Dashboard - 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg1: #0f172a; --bg2: #1e1b4b; --bg3: #111827;
            --glass: rgba(255,255,255,0.07);
            --glass-border: rgba(255,255,255,0.10);
            --text-main: #ffffff;
            --text-soft: rgba(255,255,255,0.72);
            --text-muted: rgba(255,255,255,0.45);
            --status-healthy: #4ADE80;
            --status-warning: #FBBF24;
            --status-critical: #FB7185;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
            min-height: 100vh; padding: 24px 16px; color: var(--text-main); overflow-x: hidden;
        }

        .dashboard {
            display: grid; grid-template-columns: 1fr 1.5fr;
            gap: 18px; max-width: 1400px; margin: auto; position: relative; z-index: 1;
        }

        @media (max-width: 1024px) { .dashboard { grid-template-columns: 1fr; } }

        .glass {
            background: var(--glass); backdrop-filter: blur(22px);
            border: 1px solid var(--glass-border); border-radius: 26px;
            box-shadow: 0 14px 38px rgba(0,0,0,0.3);
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; margin-bottom: 24px; max-width: 1400px; margin: 0 auto 24px auto;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 8px;
        }

        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-value { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; }

        .card-left { padding: 30px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .theme-switcher { display: flex; gap: 8px; background: rgba(255,255,255,0.06); padding: 5px; border-radius: 999px; }
        .theme-btn { border: none; padding: 6px 15px; border-radius: 999px; cursor: pointer; background: transparent; color: var(--text-soft); font-weight: 600; font-size: 0.75rem; transition: 0.3s; }
        .theme-btn.active { background: #818CF8; color: white; box-shadow: 0 4px 12px rgba(129, 140, 248, 0.3); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 0.7rem; color: var(--text-muted); padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); text-transform: uppercase; }
        td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-soft); }
        .value { font-weight: 700; color: #fff; text-align: right; }

        .footer-date { margin-top: 25px; display: flex; gap: 10px; flex-wrap: wrap; }
        .gauge-statusx {
            font-size: 0.65rem; font-weight: 700; padding: 6px 12px; border-radius: 999px;
            display: flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.1);
        }
        .gauge-statusx::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

        .card-graph { padding: 25px; text-align: center; }
        .card-graph h3 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 15px; text-align: left; }
        .chart-container { height: 280px; position: relative; }
        
        .gauge-wrap #percentText {
            position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%);
            font-size: 2.4rem; font-weight: 900;
        }

        .status-badge {
            display: inline-block; padding: 5px 14px; border-radius: 999px; font-size: 0.75rem; 
            font-weight: 800; margin-top: 15px; letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div class="stats-grid">
    <div class="stat-card">
        <span class="stat-label">Target <span class="target-year"></span></span>
        <span class="stat-value" id="stat-target">0</span>
    </div>
    <div class="stat-card">
        <span class="stat-label">Actual Sales <span class="target-year"></span></span>
        <span class="stat-value" id="stat-actual" style="color: var(--status-healthy);">0</span>
    </div>
    <div class="stat-card">
        <span class="stat-label">Achievement Rate</span>
        <span class="stat-value" id="stat-rate">0%</span>
    </div>
</div>

<div class="dashboard">
    <div class="card-left glass">
        <div class="toolbar">
            <h2>📊 Overview</h2> 
            <div class="theme-switcher">
                <button class="theme-btn" data-theme="executive">Executive</button>
                <button class="theme-btn" data-theme="neon">Neon</button>
                <button class="theme-btn" data-theme="apple">Apple</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Year</th>
                    <th style="text-align:right">Target (THB)</th>
                    <th style="text-align:right">Actual (Used)</th>
                </tr>
            </thead>
            <tbody id="data-table-body">
                <tr><td colspan="3" style="text-align:center">Loading data...</td></tr>
            </tbody>
        </table>
        
        <div class="footer-date"> 
            <div class="gauge-statusx" id="status_c">Critical</div>
            <div class="gauge-statusx" id="status_w">Warning</div>
            <div class="gauge-statusx" id="status_h">Healthy</div> 
        </div>
    </div>

    <div class="right-column" style="display: flex; flex-direction: column; gap: 18px;">
        <div class="card-graph glass">
            <h3>Yearly Progress (%)</h3>
            <div class="chart-container gauge-wrap">
                <canvas id="gaugeChart"></canvas>
                <span id="percentText">0%</span>
            </div>
            <div id="gaugeStatus" class="status-badge">...</div>
        </div>

        <div class="card-graph glass">
            <h3>Target vs Actual Comparison</h3>
            <div class="chart-container">
                <canvas id="barChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const DEFAULT_THEME = 'executive';
    const THEMES = {
        executive: {
            css: {
                '--bg1': '#0f172a', '--bg2': '#1e293b', '--bg3': '#111827',
                '--glass': 'rgba(255,255,255,0.07)', '--glass-border': 'rgba(255,255,255,0.10)',
                '--text-main': '#ffffff', '--text-soft': 'rgba(255,255,255,0.72)',
                '--text-muted': 'rgba(255,255,255,0.45)', '--status-healthy': '#4ADE80',
                '--status-warning': '#F59E0B', '--status-critical': '#EF4444'
            }
        },
        neon: {
            css: {
                '--bg1': '#050816', '--bg2': '#1a103f', '--bg3': '#09090f',
                '--glass': 'rgba(255,255,255,0.05)', '--glass-border': 'rgba(168,85,247,0.18)',
                '--text-main': '#F8FAFC', '--text-soft': 'rgba(248,250,252,0.78)',
                '--text-muted': 'rgba(248,250,252,0.48)', '--status-healthy': '#22D3EE',
                '--status-warning': '#FACC15', '--status-critical': '#FB7185'
            }
        },
        apple: {
            css: {
                '--bg1': '#f3f4f6', '--bg2': '#e5e7eb', '--bg3': '#f8fafc',
                '--glass': 'rgba(255,255,255,0.72)', '--glass-border': 'rgba(15,23,42,0.06)',
                '--text-main': '#0f172a', '--text-soft': 'rgba(15,23,42,0.78)',
                '--text-muted': 'rgba(15,23,42,0.45)', '--status-healthy': '#16A34A',
                '--status-warning': '#CA8A04', '--status-critical': '#DC2626'
            }
        }
    };

    let currentThemeKey = localStorage.getItem('dashboard-theme') || DEFAULT_THEME;
    const SHEET_ID = '1LuwjdyfKvP7VMVR0Ib9Qb9XbzhONNdslINIzFHixbbQ';
    const GID = '0';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

    let gaugeChart = null;
    let barChart = null;
    let globalData = null;

    function applyTheme(themeKey) {
        currentThemeKey = themeKey;
        const theme = THEMES[themeKey] || THEMES[DEFAULT_THEME];
        const root = document.documentElement;
        Object.entries(theme.css).forEach(([key, value]) => root.style.setProperty(key, value));
        
        localStorage.setItem('dashboard-theme', themeKey);
        document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.theme === themeKey));
        
        if (globalData) processData(globalData); // Redraw with theme colors
    }

    async function fetchData() {
        try {
            const resp = await fetch(CSV_URL + '&t=' + Date.now());
            const csv = await resp.text();
            Papa.parse(csv, {
                header: true,
                dynamicTyping: true,
                skipEmptyLines: true,
                complete: function(results) {
                    globalData = results.data;
                    processData(globalData);
                }
            });
        } catch (e) { console.error("Error fetching data:", e); }
    }
function processData(rawData) {
        // ฟังก์ชันช่วยแปลงค่าให้เป็นตัวเลขที่แท้จริง
        const cleanNum = (val) => {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            // ลบ Comma (,) และช่องว่างออก แล้วแปลงเป็น Float
            const sanitized = val.toString().replace(/,/g, '').trim();
            return parseFloat(sanitized) || 0;
        };

        // 1. Clean & Sort Data
        const data = rawData
            .filter(d => d.year) 
            .map(d => ({
                year: d.year,
                total: cleanNum(d.total), // คลีนค่า Target
                used: cleanNum(d.used)    // คลีนค่า Actual
            }))
            .sort((a, b) => a.year - b.year);

        if (data.length === 0) {
            console.error("No valid data found");
            return;
        }

        const latest = data[data.length - 1];
        
        // คำนวณ Achievement Rate
        const rate = latest.total > 0 ? (latest.used / latest.total) * 100 : 0;

        // อัปเดต Stats บนหน้าจอ
        document.querySelectorAll('.target-year').forEach(el => el.innerText = latest.year);
        document.getElementById('stat-target').innerText = latest.total.toLocaleString();
        document.getElementById('stat-actual').innerText = latest.used.toLocaleString();
        
        const rateEl = document.getElementById('stat-rate');
        rateEl.innerText = isNaN(rate) ? "0.00%" : rate.toFixed(2) + '%';
        
        // ปรับสี Rate
        const statusColor = rate < 30 ? 'var(--status-critical)' : (rate < 80 ? 'var(--status-warning)' : 'var(--status-healthy)');
        rateEl.style.color = statusColor;
        const rateGuage = document.getElementById('percentText');
        //percentText gaugeStatus
        rateGuage.innerText = isNaN(rate) ? "0.00%" : rate.toFixed(2) + '%';
        rateGuage.style.color = statusColor;

        // อัปเดตตาราง (แสดงจากปีล่าสุดขึ้นก่อน)
        const tbody = document.getElementById('data-table-body');
        tbody.innerHTML = data.slice().reverse().map(row => `
            <tr>
                <td>${row.year}</td>
                <td class="value">${row.total.toLocaleString()}</td>
                <td class="value" style="color: var(--status-healthy)">${row.used.toLocaleString()}</td>
            </tr>
        `).join('');

        // อัปเดต Legend และวาดกราฟ
        updateStatusLegend();
        renderCharts(rate, latest.used, latest.total, data);
    }

    function processDataOLD(rawData) {
        const data = rawData.filter(d => d.year && d.total).sort((a, b) => a.year - b.year);
        if (data.length === 0) return;

        const latest = data[data.length - 1];
        const rate = latest.total > 0 ? (latest.used / latest.total) * 100 : 0;

        // Update Stats
        document.querySelectorAll('.target-year').forEach(el => el.innerText = latest.year);
        document.getElementById('stat-target').innerText = latest.total.toLocaleString();
        document.getElementById('stat-actual').innerText = latest.used.toLocaleString();
        
        const rateEl = document.getElementById('stat-rate');
        rateEl.innerText = rate.toFixed(2) + '%';
        const statusColor = rate < 30 ? 'var(--status-critical)' : (rate < 80 ? 'var(--status-warning)' : 'var(--status-healthy)');
        rateEl.style.color = statusColor;

        // Update Table
        const tbody = document.getElementById('data-table-body');
        tbody.innerHTML = data.slice().reverse().map(row => `
            <tr>
                <td>${row.year}</td>
                <td class="value">${row.total.toLocaleString()}</td>
                <td class="value" style="color: var(--status-healthy)">${row.used.toLocaleString()}</td>
            </tr>
        `).join('');

        // Update Legend Colors
        ['status_c', 'status_w', 'status_h'].forEach((id, i) => {
            const key = ['--status-critical', '--status-warning', '--status-healthy'][i];
            const color = getComputedStyle(document.documentElement).getPropertyValue(key);
            const el = document.getElementById(id);
            el.style.color = color; el.style.borderColor = color + '44'; el.style.background = color + '11';
        });

        renderCharts(rate, latest.used, latest.total, data);
    }

    function renderCharts(rate, used, total, allData) {
        // 1. Gauge Chart
        const gCtx = document.getElementById('gaugeChart').getContext('2d');
        if (gaugeChart) gaugeChart.destroy();

        const color = rate < 30 ? getComputedStyle(document.documentElement).getPropertyValue('--status-critical') : 
                     (rate < 80 ? getComputedStyle(document.documentElement).getPropertyValue('--status-warning') : 
                      getComputedStyle(document.documentElement).getPropertyValue('--status-healthy'));
        
        document.getElementById('percentText').innerText = rate.toFixed(1) + '%';
        document.getElementById('percentText').style.color = color;
        const statusBadge = document.getElementById('gaugeStatus');
        statusBadge.innerText = rate < 30 ? 'CRITICAL' : (rate < 80 ? 'WARNING' : 'HEALTHY');
        statusBadge.style.background = color + '22'; statusBadge.style.color = color;

        gaugeChart = new Chart(gCtx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [used, Math.max(0, total - used)],
                    backgroundColor: [color, 'rgba(255,255,255,0.05)'],
                    borderWidth: 0, circumference: 180, rotation: 270, borderRadius: 12
                }]
            },
            options: { cutout: '82%', maintainAspectRatio: false, plugins: { tooltip: { enabled: false } } }
        });

        // 2. Bar Chart
        const bCtx = document.getElementById('barChart').getContext('2d');
        if (barChart) barChart.destroy();

        barChart = new Chart(bCtx, {
            type: 'bar',
            data: {
                labels: allData.map(d => d.year),
                datasets: [
                    {
                        label: 'Target',
                        data: allData.map(d => d.total),
                        backgroundColor: 'transparent',
                        borderColor: '#818CF8',
                        borderWidth: 2, borderRadius: 5
                    },
                    {
                        label: 'Actual',
                        data: allData.map(d => d.used),
                        backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--status-healthy'),
                        borderRadius: 5
                    }
                ]
            },
            options: {
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        type: 'logarithmic',
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: 'rgba(255,255,255,0.4)', callback: v => v >= 1000000 ? (v/1000000)+'M' : v.toLocaleString() }
                    },
                    x: { ticks: { color: 'rgba(255,255,255,0.6)' }, grid: { display: false } }
                },
                plugins: { legend: { labels: { color: 'rgba(255,255,255,0.7)', usePointStyle: true, boxWidth: 10 } } }
            }
        });
    }

    window.onload = () => {
        applyTheme(currentThemeKey);
        document.querySelectorAll('.theme-btn').forEach(btn => btn.addEventListener('click', () => applyTheme(btn.dataset.theme)));
        fetchData();
    };
</script>

</body>
</html>
